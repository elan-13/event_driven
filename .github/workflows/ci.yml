name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Update to the latest version

    # 1. Setup Python & Basic Testing
    - name: Set up Python
      uses: actions/setup-python@v5 # Update to the latest version
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ride_service/requirements.txt
        pip install -r matching_service/requirements.txt
        pip install pytest "httpx<0.28.0"

    - name: Run Pytest Suites
      run: |
        pytest ride_service/tests/
        pytest matching_service/tests/

    # 2. Code Quality & Security Scanning (SonarQube)
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@master
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    # 3. Build Docker Images
    - name: Build Ride Service Image
      run: docker build -t myapp/ride-service:latest ./ride_service

    - name: Build Matching Service Image
      run: docker build -t myapp/matching-service:latest ./matching_service

    # 3. Security Scanning using Trivy (Container Vulnerability Scanner)
    - name: Run Trivy vulnerability scanner on Ride Service
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'myapp/ride-service:latest'
        format: 'table'
        exit-code: '0' # Set to 1 to fail the build on HIGH/CRITICAL vulnerabilities
        severity: 'CRITICAL,HIGH'

    - name: Run Trivy vulnerability scanner on Matching Service
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'myapp/matching-service:latest'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    # (Note: Push to DockerHub or GHCR would go here in production)
