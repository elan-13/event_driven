version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: ride_redis
    ports:
      - "6379:6379"

  ride-service:
    build:
      context: ./ride_service
      dockerfile: Dockerfile
    container_name: ride_service
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  matching-service:
    build:
      context: ./matching_service
      dockerfile: Dockerfile
    container_name: matching_service
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
