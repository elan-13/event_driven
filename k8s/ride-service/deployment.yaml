apiVersion: apps/v1
kind: Deployment
metadata:
  name: ride-service-deployment
  labels:
    app: ride-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ride-service
  template:
    metadata:
      labels:
        app: ride-service
    spec:
      containers:
      - name: ride-service
        image: myapp/ride-service:latest
        imagePullPolicy: Never  # Ensures Minikube uses the local Docker image
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: "redis"  # Points to the redis K8s Service
        - name: REDIS_PORT
          value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: ride-service
spec:
  type: NodePort
  selector:
    app: ride-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30001
